<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Novo Servidor - SEV Digital</title>
    <style>
        body { 
            font-family: 'Segoe UI', Tahoma, sans-serif; 
            background: #eef1f5; 
            margin: 0; 
            padding: 40px 0; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            min-height: 100vh; 
            box-sizing: border-box; 
        }

        .modal-card { 
            background: white; 
            width: 100%; 
            max-width: 600px; 
            border-radius: 12px; 
            box-shadow: 0 6px 20px rgba(0,0,0,0.1); 
            padding: 30px; 
        }
        
        .header-modal { 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            margin-bottom: 5px; 
        }

        .header-modal h2 { 
            margin: 0; 
            color: #2c3e50; 
            font-size: 24px; 
            font-weight: bold; 
        }

        .subtitle { 
            color: #7f8c8d; 
            font-size: 13px; 
            margin-top: 0; 
            margin-bottom: 25px; 
        }
        
        .row { 
            display: flex; 
            gap: 15px; 
            margin-bottom: 15px; 
        }

        .col { 
            flex: 1; 
            display: flex; 
            flex-direction: column; 
        }
        
        label { 
            font-size: 11px; 
            font-weight: bold; 
            color: #7f8c8d; 
            text-transform: uppercase; 
            margin-bottom: 6px; 
        }

        input, select { 
            padding: 12px; 
            border: 1px solid #ccc; 
            border-radius: 8px; 
            font-size: 14px; 
            color: #2c3e50; 
            background: #fff; 
            outline: none; 
            transition: 0.2s; 
        }

        /* Foco dos inputs seguindo o roxo padrão do grupo */
        input:focus, select:focus { 
            border-color: #8e44ad; 
            box-shadow: 0 0 0 3px rgba(142, 68, 173, 0.15); 
        }

        input::placeholder { 
            color: #bbb; 
        }
        
        .footer-botoes { 
            display: flex; 
            justify-content: flex-end; 
            gap: 12px; 
            margin-top: 30px; 
        }

        .btn-cancelar { 
            background: #f1f5f9; 
            color: #7f8c8d; 
            padding: 12px 24px; 
            border-radius: 8px; 
            text-decoration: none; 
            font-weight: bold; 
            font-size: 14px; 
            transition: 0.3s; 
            text-align: center; 
        }

        .btn-cancelar:hover { 
            background: #e2e8f0; 
            color: #2c3e50;
        }

        /* Botão salvar com a cor roxa padrão da tabela */
        .btn-salvar { 
            background: #8e44ad; 
            color: white; 
            padding: 12px 24px; 
            border: none; 
            border-radius: 8px; 
            font-weight: bold; 
            font-size: 14px; 
            cursor: pointer; 
            transition: 0.3s; 
        }

        .btn-salvar:hover { 
            background: #732d91; 
        }
    </style>
</head>
<body>

<div class="modal-card">
    <div class="header-modal">
        <h2>Novo Servidor</h2>
    </div>
    <p class="subtitle">Preencha os dados para cadastrar um novo servidor</p>

    <form method="POST">
        {% csrf_token %}
        
        <div class="row">
            <div class="col" style="flex: 1.2;">
                <label for="siape">SIAPE</label>
                <input type="text" id="siape" name="siape" placeholder="0000000" required>
            </div>
            <div class="col">
                <label for="perfil">Perfil</label>
                <select id="perfil" name="perfil" required>
                    <option value="" disabled selected>Selecionar perfil</option>
                    <option value="1">Administrador</option>
                    <option value="2">Operador</option>
                </select>
            </div>
        </div>

        <div class="row">
            <div class="col">
                <label for="nome">Nome do Servidor</label>
                <input type="text" id="nome" name="nome_servidor" placeholder="Nome completo" required>
            </div>
        </div>

        <div class="row">
            <div class="col">
                <label for="cpf">CPF</label>
                <input type="text" id="cpf" name="cpf" placeholder="000.000.000-00" required>
            </div>
            <div class="col">
                <label for="nascimento">Data de Nascimento</label>
                <input type="date" id="nascimento" name="data_nascimento" required>
            </div>
        </div>

        <div class="row">
            <div class="col">
                <label for="email">E-mail</label>
                <input type="email" id="email" name="email" placeholder="servidor@prefeitura.gov.br" required>
            </div>
        </div>

        <div class="row">
            <div class="col">
                <label for="senha">Senha</label>
                <input type="password" id="senha" name="senha" placeholder="Mínimo 8 caracteres" required>
            </div>
        </div>

        <div class="footer-botoes">
            <a href="/perfis/" class="btn-cancelar">CANCELAR</a>
            <button type="submit" class="btn-salvar">✓ SALVAR SERVIDOR</button>
        </div>
    </form>
</div>

</body>
</html>
