{% load static %}

<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Login</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Roboto+Slab:wght@700;800&display=swap" rel="stylesheet">
    <style>
        body { min-height: 100vh; background: #ecebe7; font-family: 'Segoe UI', Tahoma, sans-serif; }
        .auth-shell { min-height: 100vh; }
        .brand-panel { background: #17315c; color: white; }
        .brand-mark { width: 58px; height: 58px; border-radius: 14px; background: white; color: #17315c; display: flex; align-items: center; justify-content: center; font-size: 30px; }
        .auth-card { border: none; border-radius: 14px; }
        .form-control { border-radius: 10px; padding: 12px 14px; }
        .form-control:focus { border-color: #17315c; box-shadow: 0 0 0 0.2rem rgba(23, 49, 92, 0.14); }
        .btn-primary-custom { background: #17315c; border: none; border-radius: 10px; padding: 12px; font-weight: 600; }
        .btn-primary-custom:hover { background: #1d4376; }
        .auth-link { color: #17315c; font-weight: 600; text-decoration: none; }
        .auth-link:hover { text-decoration: underline; }
    </style>
</head>
<body>
    <main class="auth-shell d-flex align-items-stretch">
        <section class="brand-panel d-none d-lg-flex col-lg-5 p-5 flex-column justify-content-between">
            <div>
                <div class="d-flex align-items-center gap-3 mb-5">
                    <div>
                        <h1 class=" fw-bold mb-0">SEV Digital</h1>
                        <small class="text-white-50">Controle de Serviço Externo de Veículos</small>
                    </div>
                </div>
                <div class="mt-5 mb-5" >
                    <h2 class="fw-bold" style="font-family: 'Roboto Slab', serif;">Controle de registros, gestão de serviços de frota e muito mais, em um só lugar.</h2>
                </div>
                <div class="text-center mb-4 m">

                    <img src="{% static 'img/veic.jpg' %}"
                        alt="Logo"
                        class="img-fluid"
                        style="width: 650px; border-radius: 8px; ">

                </div>
            </div>
        </section>

        <section class="col-12 col-lg-7 d-flex align-items-center justify-content-center p-4">
            <div class="w-100" style="max-width: 430px;">
                <div class="text-center mb-4 d-lg-none">
                    <div class="brand-mark mx-auto mb-3"><i class="bi bi-car-front-fill"></i></div>
                    <h1 class="h3 fw-bold mb-0" style="color:#17315c;">SEV Digital</h1>
                </div>

                <div class="card auth-card shadow-sm">
                    <div class="card-body p-4 p-md-5">
                        <div class="mb-4">
                            <p class="text-muted mb-1">Bem-vindo</p>
                            <h2 class="fw-bold mb-0" style="color:#17315c;">Entrar na plataforma</h2>
                        </div>

                        <form method="POST">
                            {% csrf_token %}
                            <div class="mb-3">
                                <label class="form-label fw-semibold" for="email">Email</label>
                                <div class="input-group">
                                    <span class="input-group-text bg-white"><i class="bi bi-envelope-fill text-muted"></i></span>
                                    <input class="form-control" type="email" name="email" id="email" placeholder="seu@email.com">
                                </div>
                            </div>
                            <div class="mb-4">
                                <label class="form-label fw-semibold" for="senha">Senha</label>
                                <div class="input-group">
                                    <span class="input-group-text bg-white"><i class="bi bi-lock-fill text-muted"></i></span>
                                    <input class="form-control" type="password" name="senha" id="senha" placeholder="Sua senha">
                                </div>
                            </div>
                            <button class="btn btn-primary-custom text-white w-100" type="submit">
                                <i class="bi bi-box-arrow-in-right me-2"></i>Entrar
                            </button>
                        </form>

                        {% for message in messages %}
                            <div class="alert alert-danger mt-3 mb-0">{{ message }}</div>
                        {% endfor %}
                    </div>
                </div>
            </div>
        </section>
    </main>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
