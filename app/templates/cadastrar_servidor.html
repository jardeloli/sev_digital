<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Cadastrar Servidor</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <style>
        body { min-height: 100vh; background: #ecebe7; font-family: 'Segoe UI', Tahoma, sans-serif; }
        .topbar { background: #17315c; color: white; }
        .brand-mark { width: 44px; height: 44px; border-radius: 12px; background: white; color: #17315c; display: flex; align-items: center; justify-content: center; font-size: 24px; }
        .form-card { border: none; border-radius: 14px; }
        .form-control, .form-select { border-radius: 10px; padding: 12px 14px; }
        .form-control:focus, .form-select:focus { border-color: #17315c; box-shadow: 0 0 0 0.2rem rgba(23, 49, 92, 0.14); }
    </style>
</head>
<body>
    <header class="topbar py-3">
        <div class="container d-flex align-items-center gap-3">
            <div class="brand-mark"><i class="bi bi-car-front-fill"></i></div>
            <div>
                <h1 class="h4 fw-bold mb-0">SEV Digital</h1>
                <small class="text-white-50">Controle de Serviço Externo de Veículos</small>
            </div>
        </div>
    </header>
    <main class="container py-5">
        <div class="row justify-content-center">
            <div class="col-12 col-lg-8 col-xl-7">
                <div class="mb-4">
                    <p class="text-muted mb-1">Cadastro de usuário</p>
                    <h2 class="fw-bold mb-0" style="color:#17315c;">
                        {% if primeiro_cadastro %}Cadastrar Admin{% else %}Cadastrar Servidor{% endif %}
                    </h2>
                </div>
                <div class="card form-card shadow-sm">
                    <div class="card-body p-4 p-md-5">
                        <form method="POST">
                            {% csrf_token %}
                            <div class="row g-3">
                                <div class="col-md-8">
                                    <label class="form-label fw-semibold" for="nome">Nome</label>
                                    <input class="form-control" type="text" name="nome" id="nome" required>
                                </div>
                                <div class="col-md-4">
                                    <label class="form-label fw-semibold" for="siape">SIAPE</label>
                                    <input class="form-control" type="text" name="siape" id="siape" required>
                                </div>
                                <div class="col-md-6">
                                    <label class="form-label fw-semibold" for="dt_nasc">Data de nascimento</label>
                                    <input class="form-control" type="date" name="dt_nasc" id="dt_nasc" required>
                                </div>
                                <div class="col-md-6">
                                    <label class="form-label fw-semibold" for="cpf">CPF</label>
                                    <input class="form-control" type="text" name="cpf" id="cpf" required>
                                </div>
                                <div class="col-md-6">
                                    <label class="form-label fw-semibold" for="email">Email</label>
                                    <input class="form-control" type="email" name="email" id="email" required>
                                </div>
                                <div class="col-md-6">
                                    <label class="form-label fw-semibold" for="senha">Senha</label>
                                    <input class="form-control" type="password" name="senha" id="senha" required>
                                </div>
                                <div class="col-12">
                                    <label class="form-label fw-semibold" for="perfil_id">Perfil</label>
                                    <select class="form-select" name="perfil_id" id="perfil_id" required>
                                        <option value="">Selecione o perfil</option>
                                        {% for perfil in perfis %}
                                            <option value="{{ perfil.id_perfil }}">{{ perfil.nome_perfil }}</option>
                                        {% endfor %}
                                    </select>
                                </div>
                            </div>
                            <button class="btn text-white w-100 mt-4" style="background:#17315c;" type="submit">
                                <i class="bi bi-person-plus-fill me-2"></i>Cadastrar
                            </button>
                        </form>
                        {% for message in messages %}
                            <div class="alert alert-danger mt-3 mb-0">{{ message }}</div>
                        {% endfor %}
                        <div class="text-center mt-4">
                            <a style="color:#17315c;font-weight:600;text-decoration:none;" href="/">Já possui conta? Faça login</a>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>
</body>
</html>
