{% extends 'base.html' %}

{% block title %}Cadastrar Servico{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-12 col-lg-8 col-xl-7">
        <div class="mb-4">
            <p class="text-muted mb-1">Configuracao operacional</p>
            <h1 class="fw-bold mb-0" style="color:#17315c;">Cadastrar Servico</h1>
        </div>

        <div class="card border-0 shadow-sm" style="border-radius:14px;">
            <div class="card-body p-4 p-md-5">
                <form method="POST">
                    {% csrf_token %}

                    <div class="row g-3">
                        <div class="col-12">
                            <label class="form-label fw-semibold" for="nome_servico">Nome do servico</label>
                            <input class="form-control" type="text" name="nome_servico" id="nome_servico" placeholder="Ex: Vistoria" required>
                        </div>

                        <div class="col-12">
                            <label class="form-label fw-semibold" for="descricao">Descricao</label>
                            <input class="form-control" type="text" name="descricao" id="descricao" placeholder="Descricao breve do servico">
                        </div>
                    </div>

                    <button class="btn text-white w-100 mt-4" style="background:#17315c;border-radius:10px;padding:12px;font-weight:600;" type="submit">
                        <i class="bi bi-tools me-2"></i>
                        Salvar servico
                    </button>
                </form>

                {% for message in messages %}
                    <div class="alert alert-danger mt-3 mb-0">{{ message }}</div>
                {% endfor %}

                <div class="text-center mt-4">
                    <a href="{% url 'lista_servicos' %}" style="color:#17315c;font-weight:600;text-decoration:none;">
                        Voltar para servicos
                    </a>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
