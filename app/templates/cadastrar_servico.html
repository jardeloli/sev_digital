{% extends 'base.html' %}

{% block title %}Cadastrar Serviço{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-12 col-lg-8 col-xl-7">
        <div class="mb-4">
            <p class="text-muted mb-1">Configuração operacional</p>
            <h1 class="fw-bold mb-0" style="color:#17315c;">Cadastrar Serviço</h1>
        </div>

        <div class="card border-0 shadow-sm" style="border-radius:14px;">
            <div class="card-body p-4 p-md-5">
                <form method="POST">
                    {% csrf_token %}

                    <div class="row g-3">
                        <div class="col-12">
                            <label class="form-label fw-semibold" for="nome_servico">Nome do Serviço</label>
                            <input class="form-control" type="text" name="nome_servico" id="nome_servico" placeholder="Ex: Vistoria" required>
                        </div>

                        <div class="col-12">
                            <label class="form-label fw-semibold" for="descricao">Descrição</label>
                            <input class="form-control" type="text" name="descricao" id="descricao" placeholder="Descrição breve do serviço">
                        </div>
                    </div>
                    <div class="row py-3">

                        <div class="col-md-6">

                            <label class="form-label fw-semibold">
                                Categoria
                            </label>

                            <select
                                name="categoria"
                                class="form-select">

                                <option value="ADMINISTRATIVO">Administrativo</option>
                                <option value="FISCALIZACAO">Fiscalização</option>
                                <option value="MANUTENCAO">Manutenção</option>
                                <option value="LOGISTICA">Logística</option>
                                <option value="LEVANTAMENTO">Levantamento</option>
                                <option value="OUTROS">Outros</option>

                            </select>

                        </div>

                        <div class="col-md-6">

                            <label class="form-label fw-semibold">
                                Status
                            </label>

                            <select
                                name="status"
                                class="form-select">

                                <option value="ATIVO">Ativo</option>
                                <option value="INATIVO">Inativo</option>

                            </select>

                        </div>

                    </div>

                    <button class="btn text-white w-100 mt-4" style="background:#17315c;border-radius:10px;padding:12px;font-weight:600;" type="submit">
                        <i class="bi bi-tools me-2"></i>
                        Salvar Serviço
                    </button>
                </form>

                {% for message in messages %}
                    <div class="alert alert-danger mt-3 mb-0">{{ message }}</div>
                {% endfor %}

                <div class="text-center mt-4">
                    <a href="{% url 'lista_servicos' %}" style="color:#17315c;font-weight:600;text-decoration:none;">
                        Voltar para Serviços
                    </a>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
