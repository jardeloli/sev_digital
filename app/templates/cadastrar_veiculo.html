{% extends 'base.html' %}

{% block title %}Cadastrar Veiculo{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-12 col-lg-8 col-xl-7">
        <div class="mb-4">
            <p class="text-muted mb-1">Cadastro da frota</p>
            <h1 class="fw-bold mb-0" style="color:#17315c;">Cadastrar Veiculo</h1>
        </div>

        <div class="card border-0 shadow-sm" style="border-radius:14px;">
            <div class="card-body p-4 p-md-5">
                <form method="POST">
                    {% csrf_token %}

                    <div class="row g-3">
                        <div class="col-md-4">
                            <label class="form-label fw-semibold" for="placa">Placa</label>
                            <input class="form-control" type="text" name="placa" id="placa" placeholder="ABC1D23" maxlength="7" required>
                        </div>

                        <div class="col-md-4">
                            <label class="form-label fw-semibold" for="marca">Marca</label>
                            <input class="form-control" type="text" name="marca" id="marca" placeholder="Marca" required>
                        </div>

                        <div class="col-md-4">
                            <label class="form-label fw-semibold" for="modelo">Modelo</label>
                            <input class="form-control" type="text" name="modelo" id="modelo" placeholder="Modelo" required>
                        </div>

                        <div class="col-md-6">
                            <label class="form-label fw-semibold" for="ano">Ano</label>
                            <input class="form-control" type="number" name="ano" id="ano" placeholder="2026" required>
                        </div>
                    </div>

                    <button class="btn text-white w-100 mt-4" style="background:#17315c;border-radius:10px;padding:12px;font-weight:600;" type="submit">
                        <i class="bi bi-car-front-fill me-2"></i>
                        Salvar veiculo
                    </button>
                </form>

                {% for message in messages %}
                    <div class="alert alert-danger mt-3 mb-0">{{ message }}</div>
                {% endfor %}

                <div class="text-center mt-4">
                    <a href="{% url 'lista_veiculos' %}" style="color:#17315c;font-weight:600;text-decoration:none;">
                        Voltar para veiculos
                    </a>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
